<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soka POS Cloud</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        .font-receipt { font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { height: 100dvh; overflow: hidden; }
        #loading-overlay { display: none; }
        #loading-overlay.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col w-full text-sm select-none">

    <div id="loading-overlay" class="fixed inset-0 bg-blue-900/90 z-[99999] flex flex-col items-center justify-center text-white backdrop-blur-md">
        <i class="fa-solid fa-sync fa-spin text-6xl mb-4"></i>
        <h2 class="text-xl font-black">Mensinkronkan Cloud...</h2>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-gradient-to-br from-blue-700 to-indigo-900 z-[9999] flex items-center justify-center p-6 text-white transition-opacity duration-500">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center w-full max-w-sm text-gray-800">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4 text-4xl shadow-inner border border-blue-200">
                <i class="fa-solid fa-store"></i>
            </div>
            <h1 class="text-2xl font-black mb-1">Soka POS Cloud</h1>
            <p class="text-gray-500 text-[11px] mb-8 text-center font-medium">Satu Akun Google untuk satu database pribadi Anda.</p>
            
            <button id="btn-login-google" onclick="loginWithGoogle()" class="w-full bg-white border-2 border-gray-100 hover:bg-gray-50 text-gray-700 font-bold text-base py-4 rounded-2xl shadow-sm transition active:scale-95 flex items-center justify-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6">
                <span id="txt-login">Masuk dengan Google</span>
            </button>
            <p id="auth-status" class="text-[9px] text-gray-400 font-bold mt-5 text-center">Data Tersimpan Aman di Google Cloud</p>
        </div>
    </div>

    <header class="h-[65px] flex-none bg-blue-600 text-white shadow-md flex justify-between items-center px-4 z-40">
        <div>
            <h1 class="text-lg font-bold"><i class="fa-solid fa-store mr-2"></i>Soka POS</h1>
            <p class="text-[9px] text-blue-100 truncate max-w-[150px]" id="header-user-email">Memuat akun...</p>
        </div>
        <button onclick="clearCart(false)" class="bg-red-500 px-3 py-2 rounded-xl text-xs"><i class="fa-solid fa-trash"></i></button>
    </header>

    <div class="flex-1 relative overflow-hidden">
        <main id="view-kasir" class="tab-content active absolute inset-0 flex-col md:flex-row bg-white">
            <section class="w-full md:w-2/3 h-full flex flex-col border-r">
                <div class="p-3 border-b flex gap-2">
                    <input type="text" id="searchInput" onkeyup="renderProducts()" placeholder="Cari barang..." class="flex-1 px-4 py-3 border rounded-xl bg-gray-50 outline-none">
                    <button onclick="openScanner('kasir')" class="bg-black text-white px-4 rounded-xl"><i class="fa-solid fa-barcode"></i></button>
                </div>
                <div id="productList" class="flex-1 overflow-y-auto p-3 grid grid-cols-2 sm:grid-cols-3 gap-3 pb-24 bg-gray-100"></div>
                <div class="absolute bottom-4 left-4 right-4 md:hidden">
                    <button onclick="toggleMobileCart(true)" class="w-full bg-blue-700 text-white p-4 rounded-2xl flex justify-between shadow-xl">
                        <span id="floatingCartTotal" class="font-black">Rp 0</span>
                        <span class="text-xs font-bold">BAYAR <i class="fa-solid fa-chevron-up"></i></span>
                    </button>
                </div>
            </section>
            
            <section id="cartSection" class="fixed inset-0 bg-white z-[80] transform translate-y-full md:translate-y-0 md:static md:w-1/3 flex flex-col transition-transform">
                <div class="md:hidden flex justify-between p-4 border-b">
                    <h2 class="font-bold">Keranjang</h2>
                    <button onclick="toggleMobileCart(false)" class="text-blue-600">Tutup</button>
                </div>
                <div id="cartItems" class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50"></div>
                <div class="p-4 border-t shadow-inner space-y-3 bg-white pb-10">
                    <div class="flex justify-between font-black text-lg"><span>TAGIHAN</span><span id="totalPrice">Rp 0</span></div>
                    <input type="number" id="payAmount" oninput="calculateChange()" placeholder="Tunai..." class="w-full p-4 bg-gray-100 rounded-2xl text-2xl font-black outline-none">
                    <button onclick="showReceipt()" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-lg">SELESAI</button>
                </div>
            </section>
        </main>

        <main id="view-barang" class="tab-content absolute inset-0 flex-col bg-gray-100 overflow-y-auto p-4 pb-24">
            <button onclick="openProductModal()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl mb-4">+ Tambah Barang Baru</button>
            <div id="masterList" class="bg-white rounded-2xl divide-y"></div>
        </main>

        <main id="view-laporan" class="tab-content absolute inset-0 flex-col bg-gray-100 overflow-y-auto p-4 pb-24">
            <div class="grid grid-cols-2 gap-2 mb-4 text-white">
                <div class="bg-blue-600 p-4 rounded-2xl"><p class="text-[10px]">OMZET</p><h3 id="reportTotalOmzet" class="font-black">Rp 0</h3></div>
                <div class="bg-emerald-500 p-4 rounded-2xl"><p class="text-[10px]">LABA</p><h3 id="reportTotalProfit" class="font-black">Rp 0</h3></div>
            </div>
            <div id="reportList" class="bg-white rounded-2xl divide-y"></div>
        </main>

        <main id="view-pengaturan" class="tab-content absolute inset-0 flex-col bg-gray-100 overflow-y-auto p-4 pb-24 space-y-4">
            <div class="bg-white p-5 rounded-2xl border flex items-center gap-4">
                <img id="user-photo" class="w-12 h-12 rounded-full border">
                <div class="flex-1"><p id="user-name-display" class="font-black">-</p><p id="user-email-display" class="text-xs text-gray-500">-</p></div>
                <button onclick="logoutGoogle()" class="text-red-500 font-bold">Logout</button>
            </div>
            <div class="bg-white p-5 rounded-2xl border space-y-3">
                <h2 class="font-bold border-b pb-2">Setelan Struk</h2>
                <input type="text" id="set-store-name" placeholder="Nama Toko" class="w-full p-2 border rounded-xl font-bold">
                <button onclick="saveStoreSettings()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl">Simpan</button>
            </div>
            <div class="bg-white p-5 rounded-2xl border">
                <h2 class="font-bold mb-3">Backup Data</h2>
                <div class="flex gap-2">
                    <button onclick="backupData()" class="flex-1 bg-emerald-500 text-white font-bold py-3 rounded-xl">Backup</button>
                    <button onclick="document.getElementById('restore-file').click()" class="flex-1 bg-amber-500 text-white font-bold py-3 rounded-xl">Restore</button>
                    <input type="file" id="restore-file" class="hidden" onchange="restoreData(event)">
                </div>
            </div>
        </main>
    </div>

    <nav class="h-[65px] flex-none bg-white border-t flex overflow-x-auto items-center z-50 shadow-xl">
        <button onclick="switchTab('kasir')" id="tab-kasir" class="flex-1 flex flex-col items-center text-blue-600"><i class="fa-solid fa-cash-register"></i><span class="text-[8px] font-bold">Kasir</span></button>
        <button onclick="switchTab('barang')" id="tab-barang" class="flex-1 flex flex-col items-center text-gray-400"><i class="fa-solid fa-boxes-stacked"></i><span class="text-[8px] font-bold">Barang</span></button>
        <button onclick="switchTab('laporan')" id="tab-laporan" class="flex-1 flex flex-col items-center text-gray-400"><i class="fa-solid fa-chart-pie"></i><span class="text-[8px] font-bold">Laporan</span></button>
        <button onclick="switchTab('pengaturan')" id="tab-pengaturan" class="flex-1 flex flex-col items-center text-gray-400"><i class="fa-solid fa-gear"></i><span class="text-[8px] font-bold">Setelan</span></button>
    </nav>

    <div id="productModal" class="fixed inset-0 bg-black/70 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h2 class="font-black text-xl mb-5">Detail Barang</h2>
            <div class="space-y-4">
                <input type="text" id="editProductBarcode" placeholder="Barcode (Scan/Ketik)" class="w-full p-3 border rounded-xl font-mono">
                <input type="text" id="editProductName" placeholder="Nama Barang" class="w-full p-3 border rounded-xl font-bold">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="editProductModal" placeholder="Modal" class="p-3 border rounded-xl text-red-600 font-bold">
                    <input type="number" id="editProductJual" placeholder="Jual" class="p-3 border rounded-xl text-blue-600 font-bold">
                </div>
                <input type="number" id="editProductStock" placeholder="Stok" class="w-full p-3 border rounded-xl font-bold">
                <button onclick="saveProductData()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-2">SIMPAN BARANG</button>
                <button onclick="closeProductModal()" class="w-full py-2 text-gray-400">Batal</button>
            </div>
        </div>
    </div>

    <div id="receiptModal" class="fixed inset-0 bg-black/70 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm">
            <div id="receipt-area" class="font-receipt text-[10px] bg-gray-50 p-4 rounded-xl border border-dashed mb-4"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="processTransaction('share_text')" class="bg-blue-600 text-white font-bold py-3 rounded-xl text-xs">Share Teks</button>
                <button onclick="processTransaction('whatsapp')" class="bg-emerald-500 text-white font-bold py-3 rounded-xl text-xs">WhatsApp</button>
                <button onclick="location.reload()" class="col-span-2 bg-gray-800 text-white py-4 rounded-xl mt-2">NOTAL BARU</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDCZ9HE0axsmlYFbSgAa8I_CEInHRPWQdk",
            authDomain: "soka-pos.firebaseapp.com",
            projectId: "soka-pos",
            storageBucket: "soka-pos.firebasestorage.app",
            messagingSenderId: "414884226943",
            appId: "1:414884226943:web:8e5eadaa3d177007059c4a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(), auth = firebase.auth();
        db.enablePersistence().catch(()=>{});

        let currentUser = null, masterProducts = [], cart = [], transactionsHistory = [], subs = [];
        let storeSettings = { name: "Soka POS", address: "Alamat Toko", footer: "Terima Kasih" };

        const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);

        function loginWithGoogle() {
            document.getElementById('txt-login').innerText = "Memproses...";
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        // KUNCI: Cek hasil redirect Google
        auth.getRedirectResult().then(result => {
            if(result.user) {
                document.getElementById('login-screen').classList.add('hidden');
            }
        }).catch(err => { console.error(err); });

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUser = user; document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('header-user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL || "";
                document.getElementById('user-name-display').innerText = user.displayName;
                document.getElementById('user-email-display').innerText = user.email;
                initData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        function logoutGoogle() { if(confirm("Keluar Akun?")) auth.signOut().then(()=>location.reload()); }

        const userDoc = () => db.collection("users").doc(currentUser.uid);
        const col = (name) => userDoc().collection(name);

        function initData() {
            subs.push(col("products").onSnapshot(s => { masterProducts = s.docs.map(d => d.data()); renderProducts(); renderMasterProducts(); }));
            subs.push(col("transactions").onSnapshot(s => { transactionsHistory = s.docs.map(d => d.data()); loadReport(); }));
        }

        function switchTab(t) {
            ['kasir','barang','laporan','pengaturan'].forEach(v => { document.getElementById(`view-${v}`).classList.remove('active'); document.getElementById(`tab-${v}`).className = "flex-1 flex flex-col items-center text-gray-400"; });
            document.getElementById(`view-${t}`).classList.add('active');
            document.getElementById(`tab-${t}`).className = `flex-1 flex flex-col items-center text-blue-600`;
            toggleMobileCart(false);
        }
        function toggleMobileCart(s) { const c = document.getElementById('cartSection'); if(s) c.classList.remove('translate-y-full'); else c.classList.add('translate-y-full'); }

        function renderProducts() {
            const list = document.getElementById('productList'); list.innerHTML = "";
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterProducts.filter(p => p.name.toLowerCase().includes(filter)).sort((a,b)=>a.name.localeCompare(b.name));
            filtered.forEach(p => {
                const d = document.createElement('div'); d.className = "bg-white p-3 rounded-xl border flex flex-col cursor-pointer min-h-[120px]";
                d.onclick = () => addToCart(p);
                d.innerHTML = `<div class="flex-1 font-bold text-xs">${p.name}</div><div class="text-[9px] text-gray-400">Stok: ${p.stock||0}</div><div class="text-blue-600 font-black text-sm">${formatRp(p.price)}</div>`;
                list.appendChild(d);
            });
        }
        function addToCart(p) { const ex = cart.find(i=>i.id===p.id); if(ex) ex.qty++; else cart.push({...p, qty: 1}); updateCartUI(); }
        function updateCartUI() {
            const container = document.getElementById('cartItems'); container.innerHTML = "";
            let total = 0; cart.forEach(i => {
                total += (i.price * i.qty);
                const d = document.createElement('div'); d.className = "bg-white p-3 rounded-xl flex items-center justify-between border";
                d.innerHTML = `<div class="flex-1 pr-2"><div class="font-bold text-[11px]">${i.name}</div><div class="text-blue-600 font-bold text-[10px]">${formatRp(i.price)}</div></div><div class="flex items-center bg-gray-100 rounded-lg overflow-hidden border"><button onclick="changeQty(${i.id}, -1)" class="w-8 py-1 bg-white">-</button><span class="px-3 font-bold text-xs">${i.qty}</span><button onclick="changeQty(${i.id}, 1)" class="w-8 py-1 bg-white">+</button></div>`;
                container.appendChild(d);
            });
            document.getElementById('totalPrice').innerText = formatRp(total); document.getElementById('totalPrice').dataset.val = total;
            document.getElementById('floatingCartTotal').innerText = formatRp(total);
        }
        function changeQty(id, d) { const i = cart.find(x=>x.id===id); if(i) { i.qty += d; if(i.qty<=0) cart = cart.filter(x=>x.id!==id); } updateCartUI(); }
        function showReceipt() {
            const t = parseInt(document.getElementById('totalPrice').dataset.val || 0); const p = parseInt(document.getElementById('payAmount').value || 0);
            if(t <= 0 || p < t) return;
            const inv = "INV-" + Date.now().toString().slice(-6);
            let itemsTxt = ""; cart.forEach(i => { itemsTxt += `${i.name}\n${i.qty} x ${i.price.toLocaleString()} = ${(i.qty*i.price).toLocaleString()}\n`; });
            const txt = `${storeSettings.name}\nNO: ${inv}\n------------------------\n${itemsTxt}------------------------\nTOTAL: ${t.toLocaleString()}\nTUNAI: ${p.toLocaleString()}\nKEMBALI: ${(p-t).toLocaleString()}`;
            document.getElementById('receipt-area').innerText = txt;
            document.getElementById('receipt-area').dataset.total = t; document.getElementById('receipt-area').dataset.pay = p; document.getElementById('receipt-area').dataset.inv = inv;
            document.getElementById('receiptModal').classList.replace('hidden','flex');
        }
        function processTransaction(type) {
            const d = document.getElementById('receipt-area').dataset;
            let m = 0; cart.forEach(i => { m += (i.buyPrice*i.qty); col("products").doc(String(i.id)).update({stock: (i.stock||0)-i.qty}); });
            const tx = { id: Date.now(), invoice: d.inv, total: parseInt(d.total), profit: parseInt(d.total)-m, date: new Date().toISOString().split('T')[0], time: new Date().toLocaleTimeString('id-ID'), items: [...cart] };
            col("transactions").doc(String(tx.id)).set(tx);
            if(type==='share_text') navigator.share({text: document.getElementById('receipt-area').innerText});
            else window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('receipt-area').innerText)}`);
        }
        function renderMasterProducts() {
            const list = document.getElementById('masterList'); list.innerHTML = "";
            masterProducts.forEach(p => {
                const d = document.createElement('div'); d.className = "p-4 flex items-center justify-between border-b bg-white";
                d.innerHTML = `<div><div class="font-bold">${p.name}</div><div class="text-xs text-gray-500">Stok: ${p.stock||0}</div></div><div class="flex gap-2"><button onclick="openProductModal(${p.id})" class="p-2 border rounded-xl"><i class="fa-solid fa-pen"></i></button><button onclick="deleteProduct(${p.id})" class="p-2 border rounded-xl text-red-500"><i class="fa-solid fa-trash"></i></button></div>`;
                list.appendChild(d);
            });
        }
        function openProductModal(id=null) {
            document.getElementById('productModal').classList.replace('hidden','flex');
            if(id) { const p = masterProducts.find(x=>x.id===id); document.getElementById('editProductId').value = p.id; document.getElementById('editProductName').value = p.name; document.getElementById('editProductModal').value = p.buyPrice; document.getElementById('editProductJual').value = p.price; document.getElementById('editProductStock').value = p.stock; }
            else { document.getElementById('editProductId').value = ""; document.getElementById('editProductName').value = ""; document.getElementById('editProductStock').value = "0"; }
        }
        function closeProductModal() { document.getElementById('productModal').classList.replace('flex','hidden'); }
        function saveProductData() {
            const n = document.getElementById('editProductName').value, b = parseInt(document.getElementById('editProductModal').value), s = parseInt(document.getElementById('editProductJual').value), st = parseInt(document.getElementById('editProductStock').value);
            const id = document.getElementById('editProductId').value || Date.now().toString();
            col("products").doc(id.toString()).set({id: parseInt(id), name: n, buyPrice: b, price: s, stock: st}, {merge:true}).then(()=>closeProductModal());
        }
        function deleteProduct(id) { col("products").doc(String(id)).delete(); }
        function loadReport() {
            const list = document.getElementById('reportList'); list.innerHTML = ""; let o=0, p=0;
            transactionsHistory.forEach(t => { o += t.total; p += t.profit; const d = document.createElement('div'); d.className = "p-3 border-b bg-white flex justify-between"; d.innerHTML = `<span>${t.invoice}</span><span class="font-bold">${formatRp(t.total)}</span>`; list.appendChild(d); });
            document.getElementById('reportTotalOmzet').innerText = formatRp(o); document.getElementById('reportTotalProfit').innerText = formatRp(p);
        }
        function backupData() { const blob = new Blob([JSON.stringify({p:masterProducts, t:transactionsHistory})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click(); }
        function restoreData(e) {
            const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); document.getElementById('loading-overlay').classList.add('active'); d.p.forEach(x => col("products").doc(String(x.id)).set(x)); d.t.forEach(x => col("transactions").doc(String(x.id)).set(x)); setTimeout(()=>location.reload(), 3000); }; r.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
